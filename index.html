<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Campo Ganadero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #181818;
  --bg3: #222222;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #f0ede8;
  --text2: #888;
  --text3: #555;
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.1);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.1);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,0.1);
  --accent: #e8d5b0;
  --radius: 10px;
  --font-mono: 'DM Mono', monospace;
  --font: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
button { font-family: var(--font); cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: var(--font); font-size: 14px; }

.app { display: flex; flex-direction: column; min-height: 100vh; max-width: 480px; margin: 0 auto; }

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 10;
}
.topbar-title { font-size: 15px; font-weight: 500; letter-spacing: 0.01em; }
.topbar-sub { font-size: 11px; color: var(--text2); margin-top: 1px; font-family: var(--font-mono); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 5px; }

.content { flex: 1; overflow-y: auto; padding-bottom: 80px; }

.nav-tabs {
  display: flex; gap: 4px; padding: 12px 16px;
  overflow-x: auto; scrollbar-width: none;
}
.nav-tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); color: var(--text2); white-space: nowrap;
  transition: all 0.15s;
}
.tab-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

.screen { display: none; }
.screen.active { display: block; }

.section { padding: 0 16px 20px; }
.section-title {
  font-size: 10px; font-weight: 500; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin: 20px 0 10px;
}

.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 16px 4px; }
.metric {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
}
.metric-val { font-size: 28px; font-weight: 300; color: var(--text); line-height: 1; margin-bottom: 4px; }
.metric-label { font-size: 11px; color: var(--text2); }
.metric-sub { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: var(--font-mono); }

.alert {
  border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px;
  border: 1px solid;
}
.alert-r { background: var(--red-bg); border-color: rgba(248,113,113,0.2); }
.alert-a { background: var(--amber-bg); border-color: rgba(251,191,36,0.2); }
.alert-b { background: var(--blue-bg); border-color: rgba(96,165,250,0.2); }
.alert-title { font-size: 13px; font-weight: 500; }
.alert-r .alert-title { color: var(--red); }
.alert-a .alert-title { color: var(--amber); }
.alert-b .alert-title { color: var(--blue); }
.alert-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }

.list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: opacity 0.15s;
}
.list-item:last-child { border-bottom: none; }
.list-item:active { opacity: 0.6; }

.avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 500; flex-shrink: 0;
}
.av-m { background: rgba(96,165,250,0.15); color: var(--blue); }
.av-h { background: rgba(244,114,182,0.15); color: #f472b6; }
.av-c { background: rgba(74,222,128,0.15); color: var(--green); }

.item-name { font-size: 13px; font-weight: 500; color: var(--text); font-family: var(--font-mono); }
.item-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.item-right { margin-left: auto; text-align: right; }
.item-val { font-size: 13px; font-weight: 500; }
.item-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }

.badge {
  display: inline-block; font-size: 10px; font-weight: 500;
  padding: 3px 8px; border-radius: 20px; font-family: var(--font-mono);
}
.bg { background: var(--green-bg); color: var(--green); }
.ba { background: var(--amber-bg); color: var(--amber); }
.br { background: var(--red-bg); color: var(--red); }
.bb { background: var(--blue-bg); color: var(--blue); }

.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
}
.card-title { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }

.detail-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.detail-row:last-child { border-bottom: none; }
.detail-key { color: var(--text2); }
.detail-val { font-weight: 500; font-family: var(--font-mono); font-size: 12px; }

.ble-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px 20px; text-align: center;
  margin-bottom: 16px;
}
.ble-icon { font-size: 32px; margin-bottom: 10px; }
.ble-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.ble-sub { font-size: 12px; color: var(--text2); }

.scan-box {
  background: var(--green-bg); border: 1px solid rgba(74,222,128,0.2);
  border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  display: none;
}
.scan-box.visible { display: block; }
.scan-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.scan-num { font-size: 22px; font-weight: 500; color: var(--green); font-family: var(--font-mono); }
.scan-found { font-size: 11px; color: var(--text2); margin-top: 4px; }

.btn {
  width: 100%; padding: 13px; border-radius: var(--radius);
  font-size: 14px; font-weight: 500; transition: opacity 0.15s;
  margin-top: 8px;
}
.btn:active { opacity: 0.7; }
.btn-primary { background: var(--text); color: var(--bg); }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }

.timeline { padding-left: 20px; position: relative; }
.tl-line { position: absolute; left: 6px; top: 6px; bottom: 6px; width: 1px; background: var(--border2); }
.tl-item { position: relative; padding: 0 0 16px 16px; }
.tl-dot { position: absolute; left: -14px; top: 4px; width: 8px; height: 8px; border-radius: 50%; background: var(--text3); }
.tl-dot.ok { background: var(--green); }
.tl-date { font-size: 10px; color: var(--text3); font-family: var(--font-mono); margin-bottom: 2px; }
.tl-desc { font-size: 13px; font-weight: 500; }
.tl-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

.form-group { margin-bottom: 14px; }
.form-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; padding: 11px 13px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); color: var(--text); font-size: 14px;
  outline: none; transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--text2); }
.form-input::placeholder { color: var(--text3); }
select.form-input option { background: var(--bg2); }

.bottom-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  display: grid; grid-template-columns: repeat(5, 1fr);
  background: var(--bg); border-top: 1px solid var(--border);
  padding: 8px 0 20px;
}
.bar-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 6px 0; transition: opacity 0.15s;
}
.bar-btn:active { opacity: 0.5; }
.bar-icon { font-size: 20px; line-height: 1; }
.bar-label { font-size: 9px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.bar-btn.active .bar-label { color: var(--accent); }

.loading { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 13px; }
.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; }

.back-btn { font-size: 13px; color: var(--blue); padding: 0; }
.header-action { font-size: 13px; color: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">Mi campo</div>
      <div class="topbar-sub" id="topbar-sub"><span class="status-dot"></span>conectado</div>
    </div>
    <div id="topbar-action"></div>
  </div>

  <div class="content">

    <!-- DASHBOARD -->
    <div id="screen-dashboard" class="screen active">
      <div class="metrics" id="metrics-row">
        <div class="metric"><div class="metric-val" id="m-total">—</div><div class="metric-label">Animales activos</div></div>
        <div class="metric"><div class="metric-val" id="m-pariciones">—</div><div class="metric-label">Pariciones</div></div>
        <div class="metric"><div class="metric-val" id="m-peso">—</div><div class="metric-label">Peso prom. kg</div><div class="metric-sub">último pesaje</div></div>
        <div class="metric"><div class="metric-val" id="m-servicio">—</div><div class="metric-label">En servicio</div></div>
      </div>
      <div class="section">
        <div class="section-title">Alertas</div>
        <div id="alertas-container"><div class="loading">Cargando...</div></div>
        <div class="section-title">Cuadros</div>
        <div id="cuadros-list"><div class="loading">Cargando...</div></div>
      </div>
    </div>

    <!-- ANIMALES -->
    <div id="screen-animales" class="screen">
      <div class="nav-tabs">
        <button class="tab-btn active" onclick="filtrarAnimales('todos', this)">Todos</button>
        <button class="tab-btn" onclick="filtrarAnimales('hembra', this)">Hembras</button>
        <button class="tab-btn" onclick="filtrarAnimales('macho', this)">Machos</button>
      </div>
      <div class="section">
        <div class="form-group" style="margin-bottom:8px">
          <input class="form-input" type="search" placeholder="Buscar caravana..." id="search-caravana" oninput="buscarAnimal(this.value)">
        </div>
        <div id="animales-list"><div class="loading">Cargando...</div></div>
      </div>
    </div>

    <!-- LECTOR BLE -->
    <div id="screen-lector" class="screen">
      <div class="section" style="padding-top:16px">
        <div class="ble-card">
          <div class="ble-icon">⬡</div>
          <div class="ble-title" id="ble-status">Listo para escanear</div>
          <div class="ble-sub">Acercá el lector a la caravana del animal</div>
        </div>
        <div class="scan-box" id="scan-box">
          <div class="scan-label">Caravana leída</div>
          <div class="scan-num" id="scan-num">—</div>
          <div class="scan-found" id="scan-found"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Caravana SENASA</label>
          <input class="form-input" type="text" id="caravana-input" placeholder="AR000000000" oninput="onCaravanaInput(this.value)" style="font-family:var(--font-mono);font-size:16px;letter-spacing:0.05em">
        </div>
        <button class="btn btn-primary" onclick="buscarPorCaravana()">Buscar animal</button>
        <button class="btn btn-secondary" onclick="showScreen('nuevo-animal')">+ Registrar nuevo animal</button>
        <div id="lector-resultado" style="margin-top:16px"></div>
      </div>
    </div>

    <!-- SANIDAD -->
    <div id="screen-sanidad" class="screen">
      <div class="nav-tabs">
        <button class="tab-btn active" onclick="filtrarSanidad('todos', this)">Todos</button>
        <button class="tab-btn" onclick="filtrarSanidad('brucelosis', this)">Brucelosis</button>
        <button class="tab-btn" onclick="filtrarSanidad('sauaipe', this)">Sauaipe</button>
        <button class="tab-btn" onclick="filtrarSanidad('antipulgas', this)">Antipulgas</button>
      </div>
      <div class="section">
        <div id="sanidad-alertas"></div>
        <div class="section-title">Registros</div>
        <div id="sanidad-list"><div class="loading">Cargando...</div></div>
      </div>
    </div>

    <!-- DETALLE ANIMAL -->
    <div id="screen-detalle" class="screen">
      <div class="section" style="padding-top:16px">
        <div id="detalle-content"><div class="loading">Cargando...</div></div>
      </div>
    </div>

    <!-- NUEVO ANIMAL -->
    <div id="screen-nuevo-animal" class="screen">
      <div class="section" style="padding-top:16px">
        <div class="form-group">
          <label class="form-label">Caravana SENASA</label>
          <input class="form-input" type="text" id="new-caravana" placeholder="AR000000000" style="font-family:var(--font-mono)">
        </div>
        <div class="form-group">
          <label class="form-label">Sexo</label>
          <select class="form-input" id="new-sexo">
            <option value="">Seleccionar...</option>
            <option value="hembra">Hembra</option>
            <option value="macho">Macho</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Raza</label>
          <input class="form-input" type="text" id="new-raza" placeholder="Angus, Hereford...">
        </div>
        <div class="form-group">
          <label class="form-label">Fecha de nacimiento</label>
          <input class="form-input" type="date" id="new-fecha">
        </div>
        <div class="form-group">
          <label class="form-label">Peso al nacer (kg)</label>
          <input class="form-input" type="number" id="new-peso" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Cuadro</label>
          <select class="form-input" id="new-cuadro">
            <option value="">Sin asignar</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="guardarAnimal()">Guardar animal</button>
        <button class="btn btn-secondary" onclick="goBack()">Cancelar</button>
        <div id="nuevo-msg" style="margin-top:10px;font-size:13px;text-align:center"></div>
      </div>
    </div>

  </div>

  <div class="bottom-bar">
    <button class="bar-btn active" id="bar-dashboard" onclick="showScreen('dashboard')">
      <span class="bar-icon">⌂</span><span class="bar-label">Inicio</span>
    </button>
    <button class="bar-btn" id="bar-animales" onclick="showScreen('animales')">
      <span class="bar-icon">♦</span><span class="bar-label">Animales</span>
    </button>
    <button class="bar-btn" id="bar-lector" onclick="showScreen('lector')">
      <span class="bar-icon">◉</span><span class="bar-label">Lector</span>
    </button>
    <button class="bar-btn" id="bar-sanidad" onclick="showScreen('sanidad')">
      <span class="bar-icon">✚</span><span class="bar-label">Sanidad</span>
    </button>
    <button class="bar-btn" id="bar-detalle" onclick="showScreen('detalle')" style="display:none">
      <span class="bar-icon">≡</span><span class="bar-label">Ficha</span>
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://cejqwdvrkpvebiysssiz.supabase.co';
const SUPA_KEY = 'sb_publishable_r6PAogK1I3EHSy-3Cqy4bQ_SHO4fmcy';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let allAnimales = [];
let filtroActual = 'todos';
let allSanidad = [];
let filtroSanidad = 'todos';
let animalActual = null;
let prevScreen = 'dashboard';

async function init() {
  await loadDashboard();
  await loadAnimales();
  await loadSanidad();
  await loadCuadrosSelect();
}

async function loadDashboard() {
  const { data: animales } = await sb.from('animales').select('id, estado, sexo, cuadro_id').eq('estado', 'activo');
  document.getElementById('m-total').textContent = animales?.length || 0;

  const { data: pariciones } = await sb.from('pariciones').select('id');
  document.getElementById('m-pariciones').textContent = pariciones?.length || 0;

  const { data: servicios } = await sb.from('servicios').select('cuadro_id').is('fecha_salida', null);
  let enServicio = 0;
  if (servicios?.length > 0 && animales) {
    const cuadrosConToro = servicios.map(s => s.cuadro_id);
    enServicio = animales.filter(a => a.sexo === 'hembra' && cuadrosConToro.includes(a.cuadro_id)).length;
  }
  document.getElementById('m-servicio').textContent = enServicio;

  const { data: pesajes } = await sb.from('pesajes').select('peso_kg').order('fecha', { ascending: false }).limit(20);
  if (pesajes?.length > 0) {
    const avg = pesajes.reduce((s, p) => s + p.peso_kg, 0) / pesajes.length;
    document.getElementById('m-peso').textContent = Math.round(avg);
  }

  const { data: brucelosis } = await sb.from('sanidad')
    .select('animal_id, fecha_vencimiento, animales(caravana_senasa)')
    .eq('tipo', 'brucelosis')
    .lte('fecha_vencimiento', new Date(Date.now() + 60 * 86400000).toISOString().split('T')[0])
    .gte('fecha_vencimiento', new Date().toISOString().split('T')[0]);

  let alertsHtml = '';
  if (brucelosis?.length > 0) {
    const vencen30 = brucelosis.filter(b => {
      const dias = Math.ceil((new Date(b.fecha_vencimiento) - new Date()) / 86400000);
      return dias <= 30;
    });
    if (vencen30.length > 0) {
      alertsHtml += `<div class="alert alert-r"><div class="alert-title">Brucelosis por vencer</div><div class="alert-sub">${vencen30.length} animal${vencen30.length > 1 ? 'es' : ''} vence${vencen30.length === 1 ? '' : n} en menos de 30 días</div></div>`;
    }
    const vencen60 = brucelosis.filter(b => {
      const dias = Math.ceil((new Date(b.fecha_vencimiento) - new Date()) / 86400000);
      return dias > 30 && dias <= 60;
    });
    if (vencen60.length > 0) {
      alertsHtml += `<div class="alert alert-a"><div class="alert-title">Brucelosis — próximos 60 días</div><div class="alert-sub">${vencen60.length} animal${vencen60.length > 1 ? 'es' : ''} entre 30 y 60 días</div></div>`;
    }
  }
  if (!alertsHtml) alertsHtml = '<div class="alert alert-b"><div class="alert-title">Sin alertas urgentes</div><div class="alert-sub">Todo en orden</div></div>';
  document.getElementById('alertas-container').innerHTML = alertsHtml;

  const { data: cuadros } = await sb.from('cuadros').select('*');
  let cuadrosHtml = '';
  if (cuadros?.length > 0) {
    cuadros.forEach(c => {
      const cant = animales?.filter(a => a.cuadro_id === c.id).length || 0;
      cuadrosHtml += `<div class="list-item" onclick="showScreen('animales')">
        <div class="avatar av-c">${c.nombre.charAt(0)}</div>
        <div><div class="item-name">${c.nombre}</div><div class="item-sub">${c.hectareas || '—'} ha</div></div>
        <div class="item-right"><div class="item-val">${cant}</div><div class="item-meta">animales</div></div>
      </div>`;
    });
  } else {
    cuadrosHtml = '<div class="empty">Sin cuadros registrados</div>';
  }
  document.getElementById('cuadros-list').innerHTML = cuadrosHtml;
}

async function loadAnimales() {
  const { data } = await sb.from('animales').select('*, cuadros(nombre)').eq('estado', 'activo').order('caravana_senasa');
  allAnimales = data || [];
  renderAnimales();
}

function renderAnimales() {
  let lista = allAnimales;
  if (filtroActual !== 'todos') lista = lista.filter(a => a.sexo === filtroActual);
  const q = document.getElementById('search-caravana')?.value?.toLowerCase();
  if (q) lista = lista.filter(a => a.caravana_senasa.toLowerCase().includes(q));
  let html = '';
  if (lista.length === 0) { document.getElementById('animales-list').innerHTML = '<div class="empty">Sin resultados</div>'; return; }
  lista.forEach(a => {
    const av = a.sexo === 'hembra' ? 'av-h' : 'av-m';
    const letra = a.sexo === 'hembra' ? 'H' : 'M';
    html += `<div class="list-item" onclick="verAnimal('${a.id}')">
      <div class="avatar ${av}">${letra}</div>
      <div>
        <div class="item-name">${a.caravana_senasa}</div>
        <div class="item-sub">${a.sexo} · ${a.raza || '—'} · ${a.fecha_nacimiento ? calcEdad(a.fecha_nacimiento) : '—'}</div>
      </div>
      <div class="item-right">
        <div class="item-meta">${a.cuadros?.nombre || 'Sin cuadro'}</div>
      </div>
    </div>`;
  });
  document.getElementById('animales-list').innerHTML = html;
}

function filtrarAnimales(f, btn) {
  filtroActual = f;
  document.querySelectorAll('#screen-animales .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAnimales();
}

function buscarAnimal(v) { renderAnimales(); }

async function loadSanidad() {
  const { data } = await sb.from('sanidad').select('*, animales(caravana_senasa)').order('fecha', { ascending: false }).limit(50);
  allSanidad = data || [];
  renderSanidad();
}

function renderSanidad() {
  let lista = allSanidad;
  if (filtroSanidad !== 'todos') lista = lista.filter(s => s.tipo === filtroSanidad);

  const hoy = new Date();
  const vencen = lista.filter(s => s.fecha_vencimiento && new Date(s.fecha_vencimiento) <= new Date(hoy.getTime() + 30 * 86400000));
  let alertHtml = '';
  if (vencen.length > 0) {
    alertHtml = `<div class="alert alert-r"><div class="alert-title">${vencen.length} registro${vencen.length > 1 ? 's' : ''} por vencer</div><div class="alert-sub">Revisá los próximos 30 días</div></div>`;
  }
  document.getElementById('sanidad-alertas').innerHTML = alertHtml;

  let html = '';
  if (lista.length === 0) { document.getElementById('sanidad-list').innerHTML = '<div class="empty">Sin registros</div>'; return; }
  lista.forEach(s => {
    const dias = s.fecha_vencimiento ? Math.ceil((new Date(s.fecha_vencimiento) - hoy) / 86400000) : null;
    let badge = '';
    if (dias !== null) {
      if (dias < 0) badge = '<span class="badge br">Vencido</span>';
      else if (dias <= 30) badge = '<span class="badge br">Por vencer</span>';
      else badge = '<span class="badge bg">Vigente</span>';
    } else {
      badge = '<span class="badge bb">OK</span>';
    }
    html += `<div class="list-item">
      <div>
        <div class="item-name">${s.tipo.charAt(0).toUpperCase() + s.tipo.slice(1)} · ${s.animales?.caravana_senasa || '—'}</div>
        <div class="item-sub">${s.producto || ''} · ${s.fecha}</div>
      </div>
      <div class="item-right">${badge}</div>
    </div>`;
  });
  document.getElementById('sanidad-list').innerHTML = html;
}

function filtrarSanidad(f, btn) {
  filtroSanidad = f;
  document.querySelectorAll('#screen-sanidad .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSanidad();
}

async function verAnimal(id) {
  animalActual = id;
  prevScreen = document.querySelector('.screen.active')?.id?.replace('screen-', '') || 'animales';
  showScreen('detalle');
  document.getElementById('detalle-content').innerHTML = '<div class="loading">Cargando...</div>';

  const { data: a } = await sb.from('animales').select('*, cuadros(nombre)').eq('id', id).single();
  const { data: pesajes } = await sb.from('pesajes').select('*').eq('animal_id', id).order('fecha', { ascending: false }).limit(5);
  const { data: sanidad } = await sb.from('sanidad').select('*').eq('animal_id', id).order('fecha', { ascending: false });
  const { data: pariciones } = await sb.from('pariciones').select('*, animales!pariciones_cria_id_fkey(caravana_senasa)').eq('madre_id', id).order('fecha_parto', { ascending: false });

  const ultimoPeso = pesajes?.[0]?.peso_kg || '—';
  const bruc = sanidad?.find(s => s.tipo === 'brucelosis');
  const brucBadge = bruc ? (new Date(bruc.fecha_vencimiento) > new Date() ? '<span class="badge bg">Vigente</span>' : '<span class="badge br">Vencida</span>') : '<span class="badge ba">Sin registro</span>';
  const antipar = sanidad?.find(s => s.tipo === 'sauaipe');
  const antipBadge = antipar ? '<span class="badge bg">OK</span>' : '<span class="badge ba">Pendiente</span>';
  const pulgas = sanidad?.find(s => s.tipo === 'antipulgas');
  const pulgasBadge = pulgas ? '<span class="badge bg">OK</span>' : '<span class="badge ba">Pendiente</span>';

  let pesajesHtml = pesajes?.length > 0 ? pesajes.map(p => `<div class="detail-row"><span class="detail-key">${p.fecha}</span><span class="detail-val">${p.peso_kg} kg</span></div>`).join('') : '<div class="empty" style="padding:12px 0">Sin pesajes</div>';
  let paricionesHtml = '';
  if (pariciones?.length > 0) {
    paricionesHtml = `<div class="timeline"><div class="tl-line"></div>` + pariciones.map(p => `
      <div class="tl-item">
        <div class="tl-dot ok"></div>
        <div class="tl-date">${p.fecha_parto}</div>
        <div class="tl-desc">Parto · ${p.resultado || '—'}</div>
        <div class="tl-sub">Cría: ${p.animales?.caravana_senasa || '—'}</div>
      </div>`).join('') + '</div>';
  } else {
    paricionesHtml = '<div class="empty" style="padding:12px 0">Sin pariciones registradas</div>';
  }

  document.getElementById('detalle-content').innerHTML = `
    <div style="text-align:center;padding:8px 0 20px">
      <div class="avatar ${a.sexo === 'hembra' ? 'av-h' : 'av-m'}" style="width:52px;height:52px;font-size:18px;margin:0 auto 10px">${a.sexo === 'hembra' ? 'H' : 'M'}</div>
      <div style="font-size:18px;font-weight:500;font-family:var(--font-mono)">${a.caravana_senasa}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">${a.sexo} · ${a.raza || '—'} · ${a.cuadros?.nombre || 'Sin cuadro'}</div>
    </div>
    <div class="card">
      <div class="card-title">Datos generales</div>
      <div class="detail-row"><span class="detail-key">Nacimiento</span><span class="detail-val">${a.fecha_nacimiento || '—'}</span></div>
      <div class="detail-row"><span class="detail-key">Edad</span><span class="detail-val">${a.fecha_nacimiento ? calcEdad(a.fecha_nacimiento) : '—'}</span></div>
      <div class="detail-row"><span class="detail-key">Peso actual</span><span class="detail-val">${ultimoPeso} kg</span></div>
      <div class="detail-row"><span class="detail-key">Estado</span><span class="detail-val">${a.estado}</span></div>
    </div>
    <div class="card">
      <div class="card-title">Sanidad</div>
      <div class="detail-row"><span class="detail-key">Brucelosis</span>${brucBadge}</div>
      ${bruc ? `<div class="detail-row"><span class="detail-key">Vence</span><span class="detail-val">${bruc.fecha_vencimiento}</span></div>` : ''}
      <div class="detail-row"><span class="detail-key">Antiparasitario</span>${antipBadge}</div>
      <div class="detail-row"><span class="detail-key">Antipulgas</span>${pulgasBadge}</div>
    </div>
    <div class="card">
      <div class="card-title">Pesajes</div>
      ${pesajesHtml}
    </div>
    ${a.sexo === 'hembra' ? `<div class="card"><div class="card-title">Pariciones</div>${paricionesHtml}</div>` : ''}
    <button class="btn btn-secondary" onclick="goBack()" style="margin-top:4px">← Volver</button>
  `;
}

function onCaravanaInput(v) {
  document.getElementById('scan-box').classList.remove('visible');
}

async function buscarPorCaravana() {
  const v = document.getElementById('caravana-input').value.trim().replace(/\s/g, '');
  if (!v) return;
  const { data } = await sb.from('animales').select('*').ilike('caravana_senasa', v).single();
  const el = document.getElementById('lector-resultado');
  if (data) {
    el.innerHTML = `<div class="alert alert-b">
      <div class="alert-title">${data.caravana_senasa}</div>
      <div class="alert-sub">${data.sexo} · ${data.raza || '—'} · ${data.estado}</div>
    </div>
    <button class="btn btn-primary" onclick="verAnimal('${data.id}')">Ver ficha completa</button>`;
  } else {
    el.innerHTML = `<div class="alert alert-a">
      <div class="alert-title">Animal no encontrado</div>
      <div class="alert-sub">Caravana ${v} no está en el sistema</div>
    </div>
    <button class="btn btn-secondary" onclick="document.getElementById('new-caravana').value='${v}';showScreen('nuevo-animal')">Registrar este animal</button>`;
  }
}

async function loadCuadrosSelect() {
  const { data } = await sb.from('cuadros').select('*');
  const sel = document.getElementById('new-cuadro');
  data?.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = c.nombre;
    sel.appendChild(opt);
  });
}

async function guardarAnimal() {
  const caravana = document.getElementById('new-caravana').value.trim();
  const sexo = document.getElementById('new-sexo').value;
  const raza = document.getElementById('new-raza').value;
  const fecha = document.getElementById('new-fecha').value;
  const peso = document.getElementById('new-peso').value;
  const cuadro = document.getElementById('new-cuadro').value;
  const msg = document.getElementById('nuevo-msg');
  if (!caravana || !sexo) { msg.textContent = 'Caravana y sexo son obligatorios'; msg.style.color = 'var(--red)'; return; }
  const { error } = await sb.from('animales').insert({
    caravana_senasa: caravana.replace(/\s/g, ''),
    sexo, raza: raza || null,
    fecha_nacimiento: fecha || null,
    peso_nacimiento: peso ? parseFloat(peso) : null,
    cuadro_id: cuadro || null,
    estado: 'activo'
  });
  if (error) { msg.textContent = 'Error: ' + error.message; msg.style.color = 'var(--red)'; return; }
  msg.textContent = 'Animal guardado correctamente'; msg.style.color = 'var(--green)';
  await loadAnimales();
  await loadDashboard();
  setTimeout(() => showScreen('animales'), 1200);
}

function calcEdad(fecha) {
  const d = new Date(fecha), hoy = new Date();
  const meses = (hoy.getFullYear() - d.getFullYear()) * 12 + hoy.getMonth() - d.getMonth();
  if (meses < 12) return meses + ' meses';
  return Math.floor(meses / 12) + ' años';
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id)?.classList.add('active');
  document.querySelectorAll('.bar-btn').forEach(b => b.classList.remove('active'));
  const barMap = { dashboard: 'bar-dashboard', animales: 'bar-animales', lector: 'bar-lector', sanidad: 'bar-sanidad', detalle: 'bar-detalle' };
  if (barMap[id]) document.getElementById(barMap[id])?.classList.add('active');
  const titles = { dashboard: 'Mi campo', animales: 'Animales', lector: 'Lector BLE', sanidad: 'Sanidad', detalle: 'Ficha animal', 'nuevo-animal': 'Nuevo animal' };
  document.getElementById('topbar-title').textContent = titles[id] || '';
  document.getElementById('topbar-action').innerHTML = id === 'animales' ? '<button class="header-action" onclick="showScreen(\'nuevo-animal\')">+ Nuevo</button>' : id === 'sanidad' ? '<button class="header-action">+ Registrar</button>' : '';
}

function goBack() { showScreen(prevScreen); }

init();
</script>

</html>
